  brainrot:
    container_name: brainrot
    image: ghcr.io/${GHCR_USERNAME}/brainrot:latest
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
